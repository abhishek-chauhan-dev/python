apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: python
  name: python
  namespace: demo  
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: python
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: python
    spec:
      containers:
      - image: abhishekchauhandev/python:1.0
        name: python
        ports:
          -  containerPort: 5000
             name: http
        resources: 
          limits: 
            cpu: 500m
            memory: 500Mi
          requests:
            cpu: 200m
            memory: 200Mi  
status: {}
